<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semi-Circular Gauge Chart</title>

  <!-- Tableau Extensions API — loaded from the OFFICIAL tableau/extensions-api GitHub repo via jsDelivr CDN -->
  <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api@main/lib/tableau.extensions.1.latest.min.js"></script>
  <!-- D3.js v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
  <!-- Shared resolution & validation logic (used by gauge.js and config.js) -->
  <script src="resolve.js"></script>
</head>
<body>

  <!-- ============ MAIN GAUGE VIEW ============ -->
  <div id="gauge-container">
    <div id="gauge-title"></div>
    <div id="gauge-subtitle"></div>
    <div id="gauge-svg-wrapper">
      <svg id="gauge-svg"></svg>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading gauge…</div>
    </div>

    <!-- Error Overlay -->
    <div id="error-message">
      <div class="error-icon">⚠️</div>
      <div class="error-text" id="error-text"></div>
      <div class="error-hint">Right-click the extension zone → "Configure" to set up the data source.</div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="gauge-tooltip" id="gauge-tooltip">
    <div class="tt-label" id="tt-label"></div>
    <div class="tt-value" id="tt-value"></div>
    <div class="tt-range" id="tt-range"></div>
  </div>

  <!--
    NOTE: The configuration dialog is now a SEPARATE page (config.html)
    opened by Tableau via displayDialogAsync(). This is the official
    Tableau Extensions API pattern for configuration popup dialogs.
  -->

  <script src="gauge.js"></script>
</body>
</html>
